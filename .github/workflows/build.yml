name: Build Multi-Arch Binaries

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: openvohive-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: openvohive-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact: openvohive-linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Frontend
        run: |
          cd web
          pnpm install --frozen-lockfile
          npx vite build

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '7' }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          go build -o ${{ matrix.artifact }} \
            -ldflags="-s -w -X github.com/openvohive/openvohive/internal/global.Version=${VERSION} -X 'github.com/openvohive/openvohive/internal/global.BuildTime=${BUILD_TIME}'" \
            .
          file ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
