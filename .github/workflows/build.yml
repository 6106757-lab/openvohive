name: Build Multi-Arch Binaries & Packages

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ============================================================
  # 构建 Go 二进制 (amd64 / arm64 / armv7)
  # ============================================================
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: openvohive-linux-amd64
            pkg_arch: amd64
          - goos: linux
            goarch: arm64
            artifact: openvohive-linux-arm64
            pkg_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            artifact: openvohive-linux-armv7
            pkg_arch: armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npx vite build

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '7' }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          go build -o ${{ matrix.artifact }} \
            -ldflags="-s -w -X github.com/openvohive/openvohive/internal/global.Version=${VERSION} -X 'github.com/openvohive/openvohive/internal/global.BuildTime=${BUILD_TIME}'" \
            .
          file ${{ matrix.artifact }}
          ls -lh ${{ matrix.artifact }}

      - name: Build IPK Package
        run: |
          mkdir -p dist/binaries
          cp ${{ matrix.artifact }} dist/binaries/
          bash scripts/build_packages.sh core-only

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvohive-ipk-${{ matrix.pkg_arch }}
          path: dist/*.ipk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvohive-apk-${{ matrix.pkg_arch }}
          path: dist/*.apk

  # ============================================================
  # 构建 LuCI 前端包 (noarch，所有架构通用)
  # ============================================================
  build-luci:
    name: Build LuCI Package (noarch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build LuCI IPK/APK
        run: |
          bash scripts/build_packages.sh luci-only

      - name: Upload LuCI IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-openvohive-ipk
          path: dist/*.ipk

      - name: Upload LuCI APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-openvohive-apk
          path: dist/*.apk

  # ============================================================
  # Release (仅在 tag push 时)
  # ============================================================
  release:
    name: Create Release
    needs: [build, build-luci]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.ipk" -o -name "*.apk" -o -name "openvohive-linux-*" \) -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
